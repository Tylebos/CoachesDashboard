<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <title>CoachesPortal</title>
        <link rel="stylesheet" href="../assets/css/portal.css">
        <link rel="stylesheet" href="../assets/css/roster.css">
        <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
        <script src="https://unpkg.com/lucide@latest"></script>
        <link href="https://unpkg.com/tabulator-tables/dist/css/tabulator.min.css" rel="stylesheet">
        <script type="text/javascript" src="https://unpkg.com/tabulator-tables/dist/js/tabulator.min.js"></script>
        <!-- Chart.js FIRST -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    </head>
    <body class="portal-body">
        <div id="page-container" style="display: none;">
            <div class="team-logo">
                <img src="../Images/DeltonaHighwolfheadsmall.webp" alt="Deltona Wolves Logo">
                <h1>DELTONA WOLVES</h1>
            </div>
            <hr class="portal-headerdivider">
            <div class="portal-layout">
                <nav class="portal-sidepanel">
                    <a href="home" class="nav-item">
                        <i data-lucide="house"></i> Home
                    </a>
                    <a href= "roster" class="nav-item">
                        <i data-lucide="trophy"></i> Roster
                    </a>
                    <a href="schedule" class="nav-item">
                        <i data-lucide="calendar-clock"></i>Schedule
                    </a>
                    <a href="stats" class="nav-item">
                        <i data-lucide="chart-bar-big"></i> Stats
                    </a>
                    <a href="games" class="nav-item">
                        <i data-lucide="medal"></i> Games
                    </a>
                    <a href="users"class="nav-item">
                        <i data-lucide="user"></i> Users
                    </a>
                </nav>
                <main class="roster-main">
                    <h1 class="roster-title">Team Roster</h1>
                    <div id="roster-table"></div>
                </main>
            </div>
        </div>
        <script>lucide.createIcons();</script>
        <script type="module" src="../assets/js/roster.js"></script>
    </body>
</html>
