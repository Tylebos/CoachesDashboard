<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <title>CoachesPortal</title>
        <link rel="stylesheet" href="../assets/css/portal.css">
        <link rel="stylesheet" href="../assets/css/roster.css">
        <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
        <script src="https://unpkg.com/lucide@latest"></script>
        <link href="https://unpkg.com/tabulator-tables/dist/css/tabulator.min.css" rel="stylesheet">
        <script type="text/javascript" src="https://unpkg.com/tabulator-tables/dist/js/tabulator.min.js"></script>
        <!-- Chart.js FIRST -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    </head>
    <body class="portal-body">
        <div id="page-container" style="display: none;">
            <div class="team-logo">
                <img src="../Images/DeltonaHighwolfheadsmall.webp" alt="Deltona Wolves Logo">
                <h1>DELTONA WOLVES</h1>
            </div>
            <hr class="portal-headerdivider">
            <div class="portal-layout">
                <nav class="portal-sidepanel">
                    <a href="home" class="nav-item">
                        <i data-lucide="house"></i> Home
                    </a>
                    <a href= "roster" class="nav-item">
                        <i data-lucide="trophy"></i> Roster
                    </a>
                    <a href="schedule" class="nav-item">
                        <i data-lucide="calendar-clock"></i>Schedule
                    </a>
                    <a href="stats" class="nav-item">
                        <i data-lucide="chart-bar-big"></i> Stats
                    </a>
                    <a href="games" class="nav-item">
                        <i data-lucide="medal"></i> Games
                    </a>
                    <a href="users"class="nav-item">
                        <i data-lucide="user"></i> Users
                    </a>
                </nav>
                <main class="roster-main">
                    <div id="roster-modal" class="modal">
                        <div class="modal-content">
                            <h2 id="player-title">Add Player</h2>
                            <span class="close-btn">&times;</span>
                            <form id="player-form">
                                <label>First Name:</label>
                                <input type="text" name="PlayerFirstName" required>
                                <label>Last Name:</label>
                                <input type="text" name="PlayerLastName" required>
                                <label>Class:</label>
                                <select name="Class">
                                    <option value="Freshman">Freshman</option>
                                    <option value="Sophmore">Sophomore</option>
                                    <option value="Junior">Junior</option>
                                    <option value="Senior">Senior</option>
                                </select>
                                <label>Phone:</label>
                                <input type="text" name="PlayerPhone" required>
                                <label>Email:</label>
                                <input type="text" name="PlayerEmail" required>
                                <label>Address:</label>
                                <input type="text" name="PlayerAddress" required>
                                <label>GPA:</label>
                                <input type="number" name="PlayerGPA" required>
                                <label>Jersey Number:</label>
                                <input type="number" name="PlayerJerseyNumber" required>
                                <label>Position:</label>
                                <select id="position" name="Position">
                                    <option value="Select Position" disabled selected>Select Position</option>
                                </select>
                            </form>
                            <button type="submit" id="submit-btn">Add Player</button>
                            <button type="reset" id="reset-btn">Clear Values</button>
                        </div>
                    </div>
                    <div id="delete-modal" class="modal">
                        <div class="delete-modal-content">
                            <span class="del-close-btn">&times;</span>
                            <h2 id="delete-title">Delete Game</h2>
                            <form id="delete-form">
                                <select id="player-select" name="playerID" required>
                                    <option value="">Select Game</option>
                                </select>
                            </form>
                            <button type="button" id="delete-sub">Delete Game</button>
                        </div>
                    </div>
                    <h1 class="roster-title">Team Roster</h1>
                    <div class="table-wrapper">

                        <div class="menu-container">
                            <button class="menu-button" id="menu-btn">
                                <i data-lucide="ellipsis"></i>
                            </button>

                            <div class="menu-dropdown" id="menu-dropdown">
                                <button id="open-modal-btn">Add Player</button>
                                <button id="delete-player">Delete Player</button>
                                <button id="export-roster">Export CSV</button>
                            </div>
                        </div>

                        <div id="roster-table"></div>

                    </div>
                    <div class="menu-dropdown" id="menu-dropdown">
                        <button id="open-modal-btn">Add Player</button>
                        <button id="edit-player">Edit Player</button>
                        <button id="delete-player">Delete Player</button>
                        <button id="export-roster">Export CSV</button>
                    </div>
                    <div class="roster-buttons">
                        <button class="roster-button" id="full">Full Roster</button>
                        <button class="roster-button" id="off">Offense</button>
                        <button class="roster-button" id="def">Defense</button>
                    </div>
                </main>
            </div>
        </div>
        <script>lucide.createIcons();</script>
        <script type="module" src="../assets/js/roster.js"></script>
    </body>
</html>
